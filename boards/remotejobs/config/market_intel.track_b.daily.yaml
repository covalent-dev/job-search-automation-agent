search:
  keywords:
    - AI engineer
    - AI developer
    - AI automation engineer
    - LLM engineer
    - RAG engineer
    - AI integration engineer
    - Python developer AI
    - Software engineer AI
  location: Remote
  max_results_per_search: 10
  max_pages: 1
  detail_salary_fetch: false
  detail_description_fetch: true
  detail_description_max_per_query: 10
  job_boards:
    - remotejobs

output:
  json_file: /Users/taxman/Andromeda/knowledge/career-income/market-intel/runs/2026-06-15-one-week-collection/raw/remotejobs_track_b_daily_{timestamp}.json
