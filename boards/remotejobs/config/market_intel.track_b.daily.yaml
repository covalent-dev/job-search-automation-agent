  use_timestamp: true
  vault_sync:
    enabled: false

browser:
  headless: true
  min_delay: 0.5
  max_delay: 1.5
  page_timeout: 30
  navigation_timeout: 45
  launch_timeout: 60
  max_retries: 1
  use_stealth: true
  blocked_fail_fast_seconds: 20
  job_cards_wait_budget_seconds: 10

ai_filter:
  enabled: false

dedupe:
  enabled: true
  hash_file: /Users/taxman/Andromeda/knowledge/career-income/market-intel/runs/2026-06-15-one-week-collection/reports/remotejobs_dedupe.jsonl

proxy:
  enabled: false

captcha:
  enabled: false
  on_detect: skip

flaresolverr:
  enabled: false

logging:
  level: INFO
  log_file: /Users/taxman/Andromeda/knowledge/career-income/market-intel/runs/2026-06-15-one-week-collection/reports/remotejobs_daily_{timestamp}.log
